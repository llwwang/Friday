<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leozwang.com 访问统计</title>
    <script src="/chart.js"></script>
    <script src="/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 80px 20px 20px;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 0 20px;
        }
        
        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        
        .navbar-brand {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            text-decoration: none;
        }
        
        .navbar-nav { display: flex; gap: 5px; }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 255, 255, 0.15);
            color: #00ffff;
        }
        
        /* 标题 */
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ffff;
        }
        
        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .chart-container h2 {
            margin-bottom: 15px;
            font-size: 1.2em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container.full-width {
            grid-column: 1 / -1;
        }
        
        /* 地图容器 */
        .map-container {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            overflow: hidden;
        }
        
        /* 访问日志 */
        .visitor-log {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-height: 400px;
            overflow-y: auto;
        }
        
        .visitor-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85em;
        }
        
        .ip { color: #00ffff; }
        .location { color: #888; }
        .device { color: #ff00ff; font-size: 0.9em; }
        .time { color: #666; }
        
        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }
        
        .refresh-btn:hover { transform: scale(1.05); }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">Friday</a>
            <div class="navbar-nav">
                <a href="/" class="nav-link">🏠 首页</a>
                <a href="/stats.html" class="nav-link active">📊 访问统计</a>
                <a href="/stock.html" class="nav-link">📈 股票监控</a>
                <a href="/tools.html" class="nav-link">🛠️ 实用工具</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1>📊 leozwang.com 访问统计</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总访问量</h3>
                <div class="stat-value" id="totalVisits">-</div>
            </div>
            <div class="stat-card">
                <h3>今日访问</h3>
                <div class="stat-value" id="todayVisits">-</div>
            </div>
            <div class="stat-card">
                <h3>独立访客</h3>
                <div class="stat-value" id="uniqueVisitors">-</div>
            </div>
            <div class="stat-card">
                <h3>页面数量</h3>
                <div class="stat-value" id="pageCount">-</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h2>📱 设备类型分布</h2>
                <canvas id="deviceChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>🌍 访问城市 TOP 10</h2>
                <canvas id="cityChart"></canvas>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h2>📈 访问趋势（最近7天）</h2>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>📄 页面访问分布</h2>
                <canvas id="pageChart"></canvas>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container full-width">
                <h2>🇨🇳 中国访问热力地图（按省份）</h2>
                <div id="chinaMap" class="map-container"></div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container full-width">
                <h2>🌍 全球访问分布地图（按国家）</h2>
                <div id="worldMap" class="map-container"></div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="visitor-log full-width">
                <h2>🕐 最近访问记录</h2>
                <div id="visitorList">加载中...</div>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadStats()">🔄 刷新</button>
    
    <script>
        let deviceChart, cityChart, trendChart, pageChart;
        let chinaMapChart, worldMapChart;
        
        // 城市到省份映射
        const cityToProvince = {
            '北京': '北京市', '北京市': '北京市',
            '上海': '上海市', '上海市': '上海市', 
            '天津': '天津市', '天津市': '天津市',
            '重庆': '重庆市', '重庆市': '重庆市',
            '广州': '广东省', '广州市': '广东省', '深圳': '广东省', '深圳市': '广东省', '东莞': '广东省', '佛山市': '广东省',
            '成都': '四川省', '成都市': '四川省',
            '杭州': '浙江省', '杭州市': '浙江省', '宁波': '浙江省',
            '南京': '江苏省', '南京市': '江苏省', '苏州': '江苏省', '苏州市': '江苏省', '无锡': '江苏省',
            '武汉': '湖北省', '武汉市': '湖北省',
            '西安': '陕西省', '西安市': '陕西省',
            '郑州': '河南省', '郑州市': '河南省',
            '长沙': '湖南省', '长沙市': '湖南省',
            '沈阳': '辽宁省', '沈阳市': '辽宁省', '大连': '辽宁省', '大连市': '辽宁省',
            '青岛': '山东省', '青岛市': '山东省', '济南': '山东省', '济南市': '山东省',
            '厦门': '福建省', '厦门市': '福建省', '福州': '福建省', '福州市': '福建省',
            '合肥': '安徽省', '合肥市': '安徽省',
            '昆明': '云南省', '昆明市': '云南省',
            '哈尔滨': '黑龙江省', '哈尔滨市': '黑龙江省',
            '长春': '吉林省', '长春市': '吉林省',
            '石家庄': '河北省', '石家庄市': '河北省',
            '太原': '山西省', '太原市': '山西省',
            '南昌': '江西省', '南昌市': '江西省',
            '贵阳': '贵州省', '贵阳市': '贵州省',
            '南宁': '广西壮族自治区', '南宁市': '广西壮族自治区',
            '兰州': '甘肃省', '兰州市': '甘肃省',
            '海口': '海南省', '海口市': '海南省',
            '呼和浩特': '内蒙古自治区', '呼和浩特市': '内蒙古自治区',
            '乌鲁木齐': '新疆维吾尔自治区', '乌鲁木齐市': '新疆维吾尔自治区',
            '银川': '宁夏回族自治区', '银川市': '宁夏回族自治区',
            '西宁': '青海省', '西宁市': '青海省',
            '拉萨': '西藏自治区', '拉萨市': '西藏自治区',
            '香港': '香港特别行政区', '澳门': '澳门特别行政区'
        };
        
        // 国家代码映射
        const countryCodeToName = {
            'CN': 'China', 'US': 'United States', 'JP': 'Japan', 'KR': 'Korea',
            'SG': 'Singapore', 'GB': 'United Kingdom', 'DE': 'Germany', 'FR': 'France',
            'CA': 'Canada', 'AU': 'Australia', 'RU': 'Russia', 'IN': 'India'
        };
        
        async function loadStats() {
            try {
                // 加载基础统计
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                
                document.getElementById('totalVisits').textContent = stats.totalVisits;
                document.getElementById('todayVisits').textContent = stats.todayVisits;
                
                // 加载访客数据
                const visitorsRes = await fetch('/api/visitors');
                const visitorsData = await visitorsRes.json();
                
                document.getElementById('uniqueVisitors').textContent = visitorsData.total;
                
                const visitors = visitorsData.visitors || [];
                
                // 设备统计
                const deviceStats = { mobile: 0, desktop: 0, spider: 0, other: 0 };
                visitors.forEach(v => {
                    const ua = v.ua || '';
                    if (ua.includes('Mobile') || ua.includes('iPhone') || ua.includes('Android')) {
                        deviceStats.mobile++;
                    } else if (ua.includes('Baiduspider') || ua.includes('bot')) {
                        deviceStats.spider++;
                    } else if (ua.includes('Windows') || ua.includes('Macintosh')) {
                        deviceStats.desktop++;
                    } else {
                        deviceStats.other++;
                    }
                });
                
                // 城市统计
                const cityStats = {};
                visitors.forEach(v => {
                    const city = v.location ? (v.location.city || 'Unknown') : 'Unknown';
                    cityStats[city] = (cityStats[city] || 0) + 1;
                });
                
                // 页面统计
                const pagesRes = await fetch('/api/pages');
                const pagesData = await pagesRes.json();
                document.getElementById('pageCount').textContent = pagesData.pages ? pagesData.pages.length : 0;
                
                // 更新图表
                updateDeviceChart(deviceStats);
                updateCityChart(cityStats);
                updateTrendChart();
                updatePageChart(pagesData.pages || []);
                updateVisitorList(visitors);
                
                // 更新地图
                await updateChinaMap(visitors);
                await updateWorldMap(visitors);
                
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 更新中国地图 - 按省份
        async function updateChinaMap(visitors) {
            const chartDom = document.getElementById('chinaMap');
            if (!chartDom) return;
            
            if (!chinaMapChart) {
                chinaMapChart = echarts.init(chartDom);
            }
            
            // 统计省份
            const provinceData = {};
            visitors.forEach(v => {
                const city = v.location?.city || v.location?.region;
                if (city) {
                    const province = cityToProvince[city] || cityToProvince[city.replace(/市$/, '')];
                    if (province) {
                        provinceData[province] = (provinceData[province] || 0) + 1;
                    }
                }
            });
            
            const mapData = Object.entries(provinceData).map(([name, value]) => ({
                name, value
            }));
            
            try {
                const response = await fetch('/map/china.json');
                const chinaJson = await response.json();
                echarts.registerMap('china', chinaJson);
                
                chinaMapChart.setOption({
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}<br/>访问量: {c}次'
                    },
                    visualMap: {
                        min: 0,
                        max: Math.max(...Object.values(provinceData), 100),
                        left: 'left',
                        top: 'bottom',
                        text: ['高', '低'],
                        textStyle: { color: '#fff' },
                        calculable: true,
                        inRange: {
                            color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695']
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'china',
                        roam: true,
                        zoom: 1.2,
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 10
                        },
                        itemStyle: {
                            areaColor: 'rgba(0, 255, 255, 0.1)',
                            borderColor: '#00ffff',
                            borderWidth: 1
                        },
                        emphasis: {
                            label: { color: '#fff', fontSize: 12 },
                            itemStyle: { areaColor: '#ff00ff' }
                        },
                        data: mapData
                    }]
                });
            } catch (error) {
                console.error('中国地图加载失败:', error);
                chartDom.innerHTML = '<div style="text-align:center;padding:100px;color:#ff6b6b">地图加载失败</div>';
            }
        }
        
        // 更新世界地图 - 按国家
        async function updateWorldMap(visitors) {
            const chartDom = document.getElementById('worldMap');
            if (!chartDom) return;
            
            if (!worldMapChart) {
                worldMapChart = echarts.init(chartDom);
            }
            
            // 统计国家
            const countryData = {};
            visitors.forEach(v => {
                const code = v.location?.country || 'CN';
                const name = countryCodeToName[code] || code;
                countryData[name] = (countryData[name] || 0) + 1;
            });
            
            const mapData = Object.entries(countryData).map(([name, value]) => ({
                name, value
            }));
            
            try {
                const response = await fetch('/map/world.json');
                const worldJson = await response.json();
                echarts.registerMap('world', worldJson);
                
                worldMapChart.setOption({
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}<br/>访问量: {c}次'
                    },
                    visualMap: {
                        min: 0,
                        max: Math.max(...Object.values(countryData), 50),
                        left: 'left',
                        top: 'bottom',
                        text: ['高', '低'],
                        textStyle: { color: '#fff' },
                        calculable: true,
                        inRange: {
                            color: ['#f7fbff', '#deebf7', '#c6dbef', '#9ecae1', '#6baed6', '#4292c6', '#2171b5', '#08519c', '#08306b']
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'world',
                        roam: true,
                        zoom: 1.2,
                        label: { show: false },
                        itemStyle: {
                            areaColor: 'rgba(255, 0, 255, 0.1)',
                            borderColor: '#ff00ff',
                            borderWidth: 0.5
                        },
                        emphasis: {
                            label: { show: true, color: '#fff' },
                            itemStyle: { areaColor: '#ff00ff' }
                        },
                        data: mapData
                    }]
                });
            } catch (error) {
                console.error('世界地图加载失败:', error);
                chartDom.innerHTML = '<div style="text-align:center;padding:100px;color:#ff6b6b">地图加载失败</div>';
            }
        }
        
        // 其他图表函数...（省略，保持原有逻辑）
        function updateDeviceChart(stats) {
            const ctx = document.getElementById('deviceChart').getContext('2d');
            if (deviceChart) deviceChart.destroy();
            deviceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['桌面端', '移动端', '爬虫', '其他'],
                    datasets: [{
                        data: [stats.desktop, stats.mobile, stats.spider, stats.other],
                        backgroundColor: ['#00ffff', '#ff00ff', '#ffff00', '#888888'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#fff' } }
                    }
                }
            });
        }
        
        function updateCityChart(cityStats) {
            const ctx = document.getElementById('cityChart').getContext('2d');
            if (cityChart) cityChart.destroy();
            
            const sorted = Object.entries(cityStats).sort((a, b) => b[1] - a[1]).slice(0, 10);
            
            cityChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(x => x[0]),
                    datasets: [{
                        label: '访问量',
                        data: sorted.map(x => x[1]),
                        backgroundColor: 'rgba(0, 255, 255, 0.6)',
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#888' }, grid: { display: false } }
                    }
                }
            });
        }
        
        async function updateTrendChart() {
            try {
                const res = await fetch('/api/trend');
                const data = await res.json();
                const trend = data.trend || [];
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                if (trendChart) trendChart.destroy();
                
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trend.map(t => t.dayName),
                        datasets: [{
                            label: '访问量',
                            data: trend.map(t => t.visits),
                            borderColor: '#00ffff',
                            backgroundColor: 'rgba(0, 255, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: '#fff' } } },
                        scales: {
                            y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                            x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                        }
                    }
                });
            } catch (error) {
                console.error('趋势图加载失败:', error);
            }
        }
        
        function updatePageChart(pages) {
            const ctx = document.getElementById('pageChart').getContext('2d');
            if (pageChart) pageChart.destroy();
            
            const sorted = pages.sort((a, b) => b.total - a.total).slice(0, 8);
            
            pageChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(p => p.page === '/' ? '首页' : p.page.replace('.html', '').replace('/', '')),
                    datasets: [{
                        label: '访问量',
                        data: sorted.map(p => p.total),
                        backgroundColor: [
                            'rgba(0, 255, 255, 0.6)', 'rgba(255, 0, 255, 0.6)', 'rgba(255, 255, 0, 0.6)',
                            'rgba(0, 255, 0, 0.6)', 'rgba(255, 100, 0, 0.6)', 'rgba(100, 100, 255, 0.6)',
                            'rgba(255, 100, 100, 0.6)', 'rgba(100, 255, 100, 0.6)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#888', maxRotation: 45 }, grid: { display: false } }
                    }
                }
            });
        }
        
        function getDeviceType(ua) {
            if (!ua) return '💻 桌面';
            if (ua.includes('Mobile') || ua.includes('Android') || ua.includes('iPhone')) return '📱 移动';
            if (ua.includes('iPad') || ua.includes('Tablet')) return '📱 平板';
            if (ua.includes('curl') || ua.includes('wget')) return '🔧 工具';
            if (ua.includes('bot') || ua.includes('spider') || ua.includes('Baidu')) return '🕷️ 爬虫';
            return '💻 桌面';
        }
        
        function updateVisitorList(visitors) {
            const container = document.getElementById('visitorList');
            const recent = visitors.slice(0, 20);
            
            container.innerHTML = recent.map(v => {
                const time = new Date(v.time).toLocaleTimeString('zh-CN');
                const device = getDeviceType(v.ua);
                let loc = 'Unknown';
                if (v.location) {
                    const parts = [];
                    if (v.location.country) parts.push(v.location.country);
                    if (v.location.region && v.location.region !== v.location.city) parts.push(v.location.region);
                    if (v.location.city) parts.push(v.location.city);
                    loc = parts.join(' ') || 'Unknown';
                }
                return `
                    <div class="visitor-item">
                        <span class="ip">${v.ip}</span>
                        <span class="location">${loc}</span>
                        <span class="device">${device}</span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');
        }
        
        // 加载数据
        loadStats();
        
        // 自动刷新
        setInterval(loadStats, 30000);
        
        // 记录访问
        fetch('/api/visit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page: window.location.pathname })
        }).catch(() => {});
        
        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            deviceChart?.resize();
            cityChart?.resize();
            trendChart?.resize();
            pageChart?.resize();
            chinaMapChart?.resize();
            worldMapChart?.resize();
        });
    </script>
</body>
</html>
