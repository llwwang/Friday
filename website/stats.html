    <button class="refresh-btn" onclick="loadStats()">🔄 刷新数据</button>
    
    <script>
        let deviceChart, cityChart, trendChart, pageChart, chinaMapChart, worldMapChart;
        
        async function loadStats() {
            try {
                // Load basic stats
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                
                document.getElementById('totalVisits').textContent = stats.totalVisits;
                document.getElementById('todayVisits').textContent = stats.todayVisits;
                
                // Show alert if visits > 100
                if (stats.todayVisits > 100) {
                    document.getElementById('alertBox').classList.add('active');
                    document.getElementById('alertCount').textContent = stats.todayVisits;
                }
                
                // Load visitors
                const visitorsRes = await fetch('/api/visitors');
                const visitorsData = await visitorsRes.json();
                
                document.getElementById('uniqueVisitors').textContent = visitorsData.total;
                
                // Analyze data
                const visitors = visitorsData.visitors || [];
                
                // Device stats
                const deviceStats = { mobile: 0, desktop: 0, spider: 0, other: 0 };
                visitors.forEach(v => {
                    const ua = v.ua || '';
                    if (ua.includes('Mobile') || ua.includes('iPhone') || ua.includes('Android')) {
                        deviceStats.mobile++;
                    } else if (ua.includes('Baiduspider') || ua.includes('bot')) {
                        deviceStats.spider++;
                    } else if (ua.includes('Windows') || ua.includes('Macintosh') || ua.includes('Linux')) {
                        deviceStats.desktop++;
                    } else {
                        deviceStats.other++;
                    }
                });
                
                // City stats
                const cityStats = {};
                visitors.forEach(v => {
                    const city = v.location ? (v.location.city || 'Unknown') : 'Unknown';
                    cityStats[city] = (cityStats[city] || 0) + 1;
                });
                
                document.getElementById('cityCount').textContent = Object.keys(cityStats).length;
                
                // Load page stats
                try {
                    const pagesRes = await fetch('/api/pages');
                    const pagesData = await pagesRes.json();
                    document.getElementById('pageCount').textContent = pagesData.pages ? pagesData.pages.length : 0;
                    
                    // Update page chart if we have data
                    if (pagesData.pages && pagesData.pages.length > 0) {
                        updatePageChart(pagesData.pages);
                    }
                } catch (e) {
                    console.error('Error loading page stats:', e);
                }
                
                // Update charts
                updateDeviceChart(deviceStats);
                updateCityChart(cityStats);
                updateTrendChart();
                updateVisitorList(visitors);
                
                // Update maps
                updateChinaMap(visitors);
                updateWorldMap(visitors);
                
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function updateDeviceChart(stats) {
            const ctx = document.getElementById('deviceChart').getContext('2d');
            
            if (deviceChart) deviceChart.destroy();
            
            deviceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['桌面端', '移动端', '爬虫', '其他'],
                    datasets: [{
                        data: [stats.desktop, stats.mobile, stats.spider, stats.other],
                        backgroundColor: ['#00ffff', '#ff00ff', '#ffff00', '#888888'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#fff' }
                        }
                    }
                }
            });
        }
        
        function updateCityChart(cityStats) {
            const sortedCities = Object.entries(cityStats)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            const ctx = document.getElementById('cityChart').getContext('2d');
            
            if (cityChart) cityChart.destroy();
            
            cityChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedCities.map(c => c[0]),
                    datasets: [{
                        label: '访问量',
                        data: sortedCities.map(c => c[1]),
                        backgroundColor: 'rgba(0, 255, 255, 0.6)',
                        borderColor: '#00ffff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }
        
        async function updateTrendChart() {
            try {
                const res = await fetch('/api/trend');
                const data = await res.json();
                const trend = data.trend || [];
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                
                if (trendChart) trendChart.destroy();
                
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trend.map(t => t.dayName),
                        datasets: [{
                            label: '访问量',
                            data: trend.map(t => t.visits),
                            borderColor: '#00ffff',
                            backgroundColor: 'rgba(0, 255, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                labels: { color: '#fff' }
                            },
                            tooltip: {
                                callbacks: {
                                    title: function(context) {
                                        const idx = context[0].dataIndex;
                                        return trend[idx].date;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#888' },
                                grid: { color: 'rgba(255,255,255,0.1)' }
                            },
                            x: {
                                ticks: { color: '#888' },
                                grid: { color: 'rgba(255,255,255,0.1)' }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading trend:', error);
            }
        }
        
        // Update page distribution chart

            const ctx = document.getElementById('pageChart').getContext('2d');
            
            if (pageChart) pageChart.destroy();
            
            // Sort by visit count and take top 8

            pageChart = new Chart(ctx, {

                        return name.length > 10 ? name.substring(0, 10) + '...' : name;
                    }),
                    datasets: [{
                        label: '访问量',

            'Melbourne': [144.9631, -37.8136, 'AU'],
            'Auckland': [174.7633, -36.8485, 'NZ'],
            'Cairo': [31.2357, 30.0444, 'EG'],
            'Johannesburg': [28.0473, -26.2041, 'ZA'],
            'Nairobi': [36.8219, -1.2921, 'KE']
        };

        // 更新中国地图
        async function updateChinaMap(visitors) {
            const chartDom = document.getElementById('chinaMap');
            if (!chartDom) return;
            
            if (!chinaMapChart) {
                chinaMapChart = echarts.init(chartDom);
            }
            
            // 统计中国各城市访问数
            const cityData = {};
            visitors.forEach(v => {
                const loc = v.location || {};
                const city = loc.city || loc.region;
                if (city && chinaCityCoords[city]) {
                    cityData[city] = (cityData[city] || 0) + 1;
                }
            });
            
            // 转换为地图数据格式
            const mapData = Object.entries(cityData).map(([city, count]) => ({
                name: city,
                value: [...chinaCityCoords[city], count],
                itemStyle: {
                    color: count > 10 ? '#ff00ff' : count > 5 ? '#00ffff' : '#ffff00'
                }
            }));
            
            // 构建飞线数据（模拟访问流向）
            const linesData = [];
            const topCities = Object.entries(cityData)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
            
            topCities.forEach(([city, count], idx) => {
                if (idx < topCities.length - 1) {
                    linesData.push({
                        coords: [chinaCityCoords[city], chinaCityCoords[topCities[idx + 1][0]]],
                        lineStyle: {
                            color: idx === 0 ? '#ff00ff' : '#00ffff',
                            width: 2,
                            opacity: 0.6
                        }
                    });
                }
            });
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 46, 0.9)',
                    borderColor: '#00ffff',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        if (params.value && params.value[2]) {
                            return `${params.name}<br/>访问量: ${params.value[2]}次`;
                        }
                        return params.name;
                    }
                },
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    label: {
                        show: true,
                        color: '#fff',
                        fontSize: 10
                    },
                    itemStyle: {
                        areaColor: 'rgba(0, 255, 255, 0.1)',
                        borderColor: '#00ffff',
                        borderWidth: 1
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: 'rgba(0, 255, 255, 0.3)'
                        },
                        label: {
                            color: '#fff'
                        }
                    }
                },
                series: [
                    {
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: mapData,
                        symbolSize: function(val) {
                            return Math.max(8, Math.min(30, val[2] * 2));
                        },
                        showEffectOn: 'render',
                        rippleEffect: {
                            brushType: 'stroke',
                            scale: 3,
                            period: 4
                        },
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{b}',
                            color: '#fff',
                            fontSize: 11
                        },
                        itemStyle: {
                            color: '#00ffff',
                            shadowBlur: 10,
                            shadowColor: '#00ffff'
                        },
                        emphasis: {
                            scale: true
                        }
                    },
                    {
                        type: 'lines',
                        coordinateSystem: 'geo',
                        data: linesData,
                        effect: {
                            show: true,
                            period: 6,
                            trailLength: 0.7,
                            color: '#fff',
                            symbolSize: 3
                        },
                        lineStyle: {
                            curveness: 0.2
                        }
                    }
                ]
            };
            
            // 加载中国地图
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json');
                const chinaJson = await response.json();
                echarts.registerMap('china', chinaJson);
                chinaMapChart.setOption(option);
            } catch (error) {
                console.error('加载中国地图失败:', error);
                chartDom.innerHTML = '<div style="text-align:center;padding:50px;color:#888">地图加载中...</div>';
            }
        }
        
        // 更新世界地图
        async function updateWorldMap(visitors) {
            const chartDom = document.getElementById('worldMap');
            if (!chartDom) return;
            
            if (!worldMapChart) {
                worldMapChart = echarts.init(chartDom);
            }
            
            // 统计各国访问数
            const countryData = {};
            const cityData = {};
            
            visitors.forEach(v => {
                const loc = v.location || {};
                const country = loc.country || 'CN';
                const city = loc.city;
                
                countryData[country] = (countryData[country] || 0) + 1;
                
                // 匹配世界城市
                if (city) {
                    const matchedCity = Object.keys(worldCityCoords).find(
                        c => c.toLowerCase() === city.toLowerCase() || 
                             city.includes(c) || 
                             c.includes(city)
                    );
                    if (matchedCity) {
                        cityData[matchedCity] = (cityData[matchedCity] || 0) + 1;
                    }
                }
            });
            
            // 如果中国城市多，也加上
            visitors.forEach(v => {
                const loc = v.location || {};
                const city = loc.city;
                if (city && chinaCityCoords[city] && !cityData[city]) {
                    cityData[city] = (cityData[city] || 0) + 1;
                }
            });
            
            const mapData = Object.entries(cityData).map(([city, count]) => ({
                name: city,
                value: [...(worldCityCoords[city] || chinaCityCoords[city] || [0, 0]), count],
                itemStyle: {
                    color: count > 10 ? '#ff00ff' : count > 5 ? '#00ffff' : '#ffff00'
                }
            }));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 46, 0.9)',
                    borderColor: '#ff00ff',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        if (params.value && params.value[2]) {
                            return `${params.name}<br/>访问量: ${params.value[2]}次`;
                        }
                        return params.name;
                    }
                },
                geo: {
                    map: 'world',
                    roam: true,
                    zoom: 1.2,
                    label: {
                        show: false
                    },
                    itemStyle: {
                        areaColor: 'rgba(255, 0, 255, 0.1)',
                        borderColor: '#ff00ff',
                        borderWidth: 0.5
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: 'rgba(255, 0, 255, 0.3)'
                        }
                    }
                },
                series: [
                    {
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: mapData,
                        symbolSize: function(val) {
                            return Math.max(8, Math.min(30, val[2] * 2));
                        },
                        showEffectOn: 'render',
                        rippleEffect: {
                            brushType: 'stroke',
                            scale: 3,
                            period: 4
                        },
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{b}',
                            color: '#fff',
                            fontSize: 10
                        },
                        itemStyle: {
                            color: '#ff00ff',
                            shadowBlur: 10,
                            shadowColor: '#ff00ff'
                        }
                    }
                ]
            };
            
            // 加载世界地图
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/world.json');
                const worldJson = await response.json();
                echarts.registerMap('world', worldJson);
                worldMapChart.setOption(option);
            } catch (error) {
                console.error('加载世界地图失败:', error);
                chartDom.innerHTML = '<div style="text-align:center;padding:50px;color:#888">地图加载中...</div>';
            }
        }
        
        // 获取设备类型
        function getDeviceType(ua) {
            if (!ua) return '💻 桌面';
            
            if (ua.includes('Mobile') || ua.includes('Android') || ua.includes('iPhone')) {
                return '📱 移动';
            } else if (ua.includes('iPad') || ua.includes('Tablet')) {
                return '📱 平板';
            } else if (ua.includes('curl') || ua.includes('wget') || ua.includes('httpie')) {
                return '🔧 工具';
            } else if (ua.includes('bot') || ua.includes('spider') || ua.includes('crawler') || ua.includes('Baidu') || ua.includes('Google')) {
                return '🕷️ 爬虫';
            } else {
                return '💻 桌面';
            }
        }
        
        function updateVisitorList(visitors) {
            const container = document.getElementById('visitorList');
            const recentVisitors = visitors.slice(0, 20);

            container.innerHTML = recentVisitors.map(v => {
                const time = new Date(v.time).toLocaleTimeString('zh-CN');
                const ip = v.ip;
                const deviceType = getDeviceType(v.ua);
                
                // Build location string with city, region, country, and ISP
                let locationStr = 'Unknown';
                if (v.location) {
                    const parts = [];
                    if (v.location.country && v.location.country !== 'Unknown') {
                        parts.push(v.location.country);
                    }
                    if (v.location.region && v.location.region !== v.location.city) {
                        parts.push(v.location.region);
                    }
                    if (v.location.city && v.location.city !== 'Unknown') {
                        parts.push(v.location.city);
                    }
                    if (v.location.isp) {
                        parts.push(`(${v.location.isp})`);
                    }
                    locationStr = parts.join(' ') || 'Unknown';
                }
                return `
                    <div class="visitor-item">
                        <span class="ip">${ip}</span>
                        <span class="location">${locationStr}</span>
                        <span class="device">${deviceType}</span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');
        }
        
        // Load on page load
        loadStats();
        
        // Auto refresh every 30 seconds
        setInterval(loadStats, 30000);
        
        // Record visit for this page
        fetch('/api/visit', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page: window.location.pathname })
        }).catch(() => {});
        
        // Handle window resize for charts
        window.addEventListener('resize', function() {
            if (chinaMapChart) chinaMapChart.resize();
            if (worldMapChart) worldMapChart.resize();
            if (deviceChart) deviceChart.resize();
            if (cityChart) cityChart.resize();
            if (trendChart) trendChart.resize();
            if (pageChart) pageChart.resize();
        });
    </script>
